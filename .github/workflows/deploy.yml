name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source code (main branch)
        uses: actions/checkout@v4
        # 注意：这里 checkout 的是 main 分支（源码），不是 gh-pages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build project (outputs to ./docs)
        run: npm run build

      - name: Deploy ./docs to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs        # ← 你的构建产物在 docs 目录
          publish_branch: gh-pages   # ← 推送到 gh-pages 分支
